spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

server:
  port: 9000

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
